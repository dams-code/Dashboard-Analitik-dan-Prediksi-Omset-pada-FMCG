<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Analitik dan Prediksi Omset pada FMCG</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./style/custom.css">
</head>
<body>
    <div class="bg-blue-500 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold tracking-wide">Dashboard Analitik dan Prediksi Omset pada FMCG</h1>
    </div>

    <div class="max-w-7xl mx-auto p-6 grid grid-cols-1 md:grid-cols-4 gap-6">
        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-200 col-span-1">
            <h2 class="font-semibold text-gray-600 mb-4 border-b pb-2">Filter Data</h2>
            <div class="mb-4">
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Bulan</label>
                <div class="grid grid-cols-2 gap-2" id="filter-bulan">
                    <button class="bg-blue-50 text-blue-700 px-3 py-2 rounded text-sm font-medium hover:bg-blue-100 transition">Mei</button>
                </div>
            </div>
        </div>

        <div class="md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col justify-between">
                <span class="text-sm font-semibold text-gray-400 uppercase">Total Revenue</span>
                <h3 class="text-3xl font-bold text-gray-800 mt-2" id="txt-total-revenue">Rp 0</h3>
                <span class="text-xs text-green-600 mt-2">▲ Aktif dari Sales Lapangan</span>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col justify-between border-l-4 border-blue-600">
                <span class="text-sm font-semibold text-blue-500 uppercase">Prediksi Omset</span>
                <h3 class="text-3xl font-bold text-blue-900 mt-2" id="txt-prediction-revenue">Rp 0</h3>
                <span class="text-xs text-gray-400 mt-2">Hasil Prediksi Linear Regression</span>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 flex flex-col justify-between">
                <span class="text-sm font-semibold text-gray-400 uppercase">Transaksi Pembayaran</span>
                <h3 class="text-3xl font-bold text-gray-800 mt-2" id="txt-total-sales">0</h3>
                <span class="text-xs text-gray-400 mt-2">Transaksi Bersih</span>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 col-span-1 md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="md:col-span-2">
                    <h3 class="text-md font-semibold text-gray-700 mb-4">Tren Omset Aktual / Terkini vs Prediksi Target Omset Masa Depan</h3>
                    <div class="relative w-full h-72">
                        <canvas id="chartTrendOmset"></canvas>
                    </div>
                </div>

                <div class="md:col-span-1 border-t md:border-t-0 md:border-l border-gray-200 pt-4 md:pt-0 md:pl-6">
                    <h3 class="text-md font-semibold text-gray-700 mb-4">Proporsi Penjualan Produk</h3>
                    <div class="relative w-full h-72 flex justify-center">
                        <canvas id="chartPieProduk"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="./scripts/script.js"></script>
</body>
</html>
